<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ترتيب أحياء سيدي مومن | Sidi Moumen Ranking</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header>
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <i class="fas fa-chart-bar"></i>
        </div>
        <div class="header-title">
          <h1>ترتيب أحياء سيدي مومن</h1>
          <p>منصة تفاعلية احترافية لتقييم وترتيب أحياء المنطقة</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <!-- Stats Grid -->
    <div class="stats-section" id="statsGrid">
      <div class="stat-card gradient-purple">
        <div class="stat-icon"><i class="fas fa-list-ol"></i></div>
        <div class="stat-value" id="totalVotes">0</div>
        <div class="stat-label">إجمالي الأصوات</div>
      </div>
      <div class="stat-card gradient-blue">
        <div class="stat-icon"><i class="fas fa-city"></i></div>
        <div class="stat-value" id="totalNeighborhoods">19</div>
        <div class="stat-label">عدد الأحياء</div>
      </div>
      <div class="stat-card gradient-cyan">
        <div class="stat-icon"><i class="fas fa-chart-pie"></i></div>
        <div class="stat-value" id="avgVotes">0</div>
        <div class="stat-label">متوسط الأصوات</div>
      </div>
    </div>

    <!-- Main Grid -->
    <div class="main-content">
      <!-- Leaderboard -->
      <section class="leaderboard-section">
        <div class="section-header">
          <h2 class="section-title"><i class="fas fa-trophy"></i> ترتيب الأحياء</h2>
          <div class="live-badge"><i class="fas fa-circle"></i> مباشر</div>
        </div>
        <div id="leaderboard" class="loading">جاري تحميل البيانات...</div>
      </section>

      <!-- Vote Form -->
      <aside class="vote-form-section">
        <h2 class="section-title"><i class="fas fa-star"></i> صوّت للحي المفضل</h2>
        <div id="voteMessage"></div>
        
        <div id="voteStatus" class="vote-status">
          <p id="voteStatusText">لم تصوّت بعد</p>
        </div>
        
        <form id="voteForm">
          <div class="form-group">
            <label for="voteNeighborhood"><i class="fas fa-gem"></i> اختر حيك المفضل:</label>
            <select id="voteNeighborhood" required>
              <option value="">-- اختر الحي --</option>
            </select>
          </div>

          <button type="submit" class="btn-vote"><i class="fas fa-check"></i> صوّت الآن</button>
        </form>

        <!-- Share Section -->
        <div class="share-section">
          <h3 class="section-title" style="font-size: 16px;"><i class="fas fa-share-alt"></i> شارك النتائج</h3>
          <div class="share-buttons">
            <button class="share-btn twitter" onclick="shareOnTwitter()" title="تويتر"><i class="fab fa-twitter"></i></button>
            <button class="share-btn facebook" onclick="shareOnFacebook()" title="فيسبوك"><i class="fab fa-facebook"></i></button>
            <button class="share-btn whatsapp" onclick="shareOnWhatsApp()" title="واتس آب"><i class="fab fa-whatsapp"></i></button>
            <button class="share-btn copy" onclick="copyLink()" title="نسخ الرابط"><i class="fas fa-link"></i></button>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p><i class="fas fa-sparkles"></i> منصة احترافية لأحياء سيدي مومن | صُنعت بـ <i class="fas fa-heart"></i> من قبل المجتمع</p>
    <p style="margin-top: 10px; font-size: 12px; opacity: 0.8;">© 2026 جميع الحقوق محفوظة</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
